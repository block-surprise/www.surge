<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>メモ - SURGE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: #fdfdfd;
      --text: #333;
      --muted: #888;
      --accent: #4da6ff;
      --border: #eee;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W3", "Yu Gothic", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ヘッダー */
    .header {
      padding: env(safe-area-inset-top, 20px) 20px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* メモエリア */
    .editor-container {
      flex: 1;
      padding: 20px;
    }
    #memo-editor {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 1.1rem;
      line-height: 1.8;
      background: transparent;
      color: var(--text);
    }

    /* 下部ツールバー（文字数カウントなど） */
    .toolbar {
      padding: 10px 20px env(safe-area-inset-bottom, 10px);
      background: #f8f9fa;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="back-btn"><i class="fa-solid fa-chevron-left"></i> 戻る</a>
    <div class="status" id="save-status">保存済み</div>
  </header>

  <main class="editor-container">
    <textarea id="memo-editor" placeholder="ここにメモを書いてください…"></textarea>
  </main>

  <footer class="toolbar">
    <span id="char-count">0</span> 文字
  </footer>

  <script>
    const editor = document.getElementById('memo-editor');
    const status = document.getElementById('save-status');
    const charCount = document.getElementById('char-count');

    // 読み込み時に保存された内容を復元
    window.onload = () => {
      const savedMemo = localStorage.getItem('surge_memo');
      if (savedMemo) {
        editor.value = savedMemo;
        updateCharCount();
      }
    };

    // 入力するたびに自動保存
    editor.addEventListener('input', () => {
      const content = editor.value;
      localStorage.setItem('surge_memo', content);
      
      updateCharCount();
      
      // 保存中の表示を出す
      status.textContent = '保存中…';
      clearTimeout(window.saveTimer);
      window.saveTimer = setTimeout(() => {
        status.textContent = '保存済み';
      }, 800);
    });

    function updateCharCount() {
      charCount.textContent = editor.value.length;
    }
  </script>

</body>
</html>
