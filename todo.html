<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>やること - SURGE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: #fdfdfd;
      --text: #333;
      --muted: #888;
      --accent: #4da6ff;
      --border: #eee;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W3", "Yu Gothic", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ヘッダー */
    .header {
      padding: env(safe-area-inset-top, 20px) 20px 15px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 入力エリア */
    .input-group {
      padding: 20px;
      display: flex;
      gap: 10px;
    }
    #todo-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 12px;
      outline: none;
      background: #fff;
    }
    .add-btn {
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    /* リストエリア */
    .todo-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      list-style: none;
      margin: 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 15px;
      accent-color: var(--accent);
    }
    .todo-text {
      flex: 1;
      font-size: 1rem;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .delete-btn {
      color: #ffb3b3;
      border: none;
      background: none;
      padding: 10px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .delete-btn:hover { color: #ff4d4d; }

  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="back-btn"><i class="fa-solid fa-chevron-left"></i> 戻る</a>
    <span style="margin-left: auto; font-weight: 700; font-size: 1.1rem;">やること</span>
  </header>

  <div class="input-group">
    <input type="text" id="todo-input" placeholder="新しく追加…" autocomplete="off">
    <button class="add-btn" id="add-btn">追加</button>
  </div>

  <ul class="todo-list" id="todo-list">
    </ul>

  <script>
    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('todo-list');

    let todos = JSON.parse(localStorage.getItem('surge_todos')) || [];

    function save() {
      localStorage.setItem('surge_todos', JSON.stringify(todos));
    }

    function render() {
      list.innerHTML = '';
      todos.forEach((todo, index) => {
        const li = document.createElement('li');
        li.className = `todo-item ${todo.done ? 'completed' : ''}`;
        li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggle(${index})">
          <span class="todo-text">${todo.text}</span>
          <button class="delete-btn" onclick="remove(${index})"><i class="fa-solid fa-trash-can"></i></button>
        `;
        list.appendChild(li);
      });
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      input.value = '';
      save();
      render();
    }

    window.toggle = (index) => {
      todos[index].done = !todos[index].done;
      save();
      render();
    };

    window.remove = (index) => {
      todos.splice(index, 1);
      save();
      render();
    };

    addBtn.onclick = addTodo;
    input.onkeydown = (e) => { if (e.key === 'Enter') addTodo(); };

    render();
  </script>

</body>
</html>
