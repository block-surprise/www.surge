<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SURGE</title>

  <!-- Font AwesomeпјҲз„Ўж–ҷзүҲпјү -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root{
      --bg:#fdfdfd;
      --text:#333;
      --muted:#888;
      --border:#d9d9d9;
      --accent:#4da6ff;
      --shadow:rgba(0,0,0,0.06);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* top-right bar */
    .topbar{
      position:fixed;
      top:12px;
      right:12px;
      display:flex;
      gap:.6rem;
      align-items:center;
    }

    /* AI гғңгӮҝгғіпјҲжһ гҒӘгҒ—пјү */
    .ai-btn{
      padding:.6rem .8rem;
      background:transparent;
      border:none;
      font-size:1.2rem;
      color:#000;
      cursor:pointer;
    }

    /* GoogleгғҖгғјгӮҜгғўгғјгғүйўЁпјҡй»’иғҢжҷҜ Г— зҷҪгӮўгӮӨгӮігғіпјҲжһ гҒӘгҒ—пјү */
    .settings-btn{
      padding:1rem 1.2rem;
      background:#000;   /* вҶҗ й»’иғҢжҷҜ */
      border:none;       /* вҶҗ жһ гҒӘгҒ— */
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:14px;
    }
    .settings-btn i{
      font-size:2.4rem;  /* вҶҗ еӨ§гҒҚгӮҒпјҲGoogleйўЁпјү */
      color:#fdfdfd;     /* вҶҗ иғҢжҷҜиүІгҒЁеҗҢгҒҳзҷҪ */
    }

    /* center */
    .center{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:10vh 2rem 6vh;
      text-align:center;
    }

    /* SURGEгӮҝгӮӨгғҲгғ«гӮ’еӨ§гҒҚгҒҸ */
    h1{
      margin:0 0 .25rem;
      font-weight:700;
      font-size:3.4rem;
      letter-spacing:.06em;
      color:#333;
    }

    .subtitle{
      margin:0 0 2.2rem;
      color:var(--muted);
      font-size:1.1rem;
    }

    /* search inputпјҲзёҰгӮ’еӨ§гҒҚгҒҸпјү */
    #query{
      width:min(92vw, 640px);
      padding:1.35rem 1.4rem;
      font-size:1.28rem;
      border:1px solid var(--border);
      border-radius:36px;
      background:#fff;
      box-shadow: 0 2px 12px var(--shadow);
      outline:none;
      transition: border-color .2s ease, box-shadow .2s ease, transform .18s ease;
    }

    /* history */
    .history{
      margin-top:1.2rem;
      width:min(92vw, 640px);
      text-align:left;
      color:#666;
      font-size:.95rem;
    }
    .history-title{
      margin:0 0 .4rem;
      color:#777;
      font-size:.9rem;
    }
    .history-list{
      display:flex;
      flex-wrap:wrap;
      gap:.4rem .6rem;
    }
    .history-item{
      padding:.25rem .55rem;
      border:1px dashed #cfcfcf;
      border-radius:14px;
      cursor:pointer;
      background:#fff;
    }
    .history-item:hover{
      color:var(--accent);
      border-color:var(--accent);
    }

    /* modal */
    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.22);
      display:none;
      align-items:center;
      justify-content:center;
      padding:1rem;
    }
    .modal{
      width:min(94vw, 720px);
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      max-height:90vh;
    }
    .modal-header{
      padding:1rem 1.2rem;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .modal-title{
      font-weight:600;
    }
    .modal-body{
      padding:1rem 1.2rem;
      display:grid;
      gap:1.2rem;
      overflow-y:auto;
      flex:1 1 auto;
    }
    .section{
      border:1px solid #eee;
      border-radius:12px;
      padding:.9rem;
    }
    .label{
      color:#555;
      font-size:.95rem;
      margin-bottom:.4rem;
    }
    .list{
      display:grid;
      gap:.35rem;
    }
    .app-item{
      padding:.45rem .7rem;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      text-decoration:none;
      color:var(--text);
      display:inline-block;
      transition:border-color .2s ease, color .2s ease;
    }
    .app-item:hover{
      border-color:var(--accent);
      color:var(--accent);
    }
    .modal-footer{
      padding:.9rem 1.2rem;
      border-top:1px solid var(--border);
      display:flex;
      gap:.6rem;
      justify-content:flex-end;
    }
    .btn{
      padding:.5rem .8rem;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      cursor:pointer;
    }
    .btn.primary{
      border-color:var(--accent);
      color:#fff;
      background:var(--accent);
    }

  </style>
</head>
<body>

  <!-- top bar -->
  <div class="topbar">
    <a href="/ai/" class="ai-btn">AI</a>

    <!-- GoogleйўЁпјҲй»’иғҢжҷҜ Г— зҷҪгӮўгӮӨгӮігғіпјү -->
    <button class="settings-btn" id="openApps" aria-label="гҒқгҒ®д»–гӮўгғ—гғӘ">
      <i class="fa-solid fa-table-cells"></i>
    </button>
  </div>

  <!-- center -->
  <main class="center">
    <h1>SURGE</h1>
    <p class="subtitle">е…үгҒ®гӮҲгҒҶгҒ«гҖҒзҹҘгӮ’гҒҹгҒ©гӮӢгҖӮ</p>

    <input id="query" type="text" placeholder="жӨңзҙўгғҜгғјгғүгӮ’е…ҘеҠӣвҖҰ" autocomplete="off" spellcheck="false"/>

    <section class="history" id="historySection" aria-label="жӨңзҙўеұҘжӯҙ">
      <div class="history-list" id="history"></div>
    </section>
  </main>

  <!-- гҒқгҒ®д»–гӮўгғ—гғӘ modal -->
  <div class="modal-backdrop" id="appsModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="appsTitle">
      <div class="modal-header">
        <div class="modal-title" id="appsTitle">гҒқгҒ®д»–гӮўгғ—гғӘ</div>
        <button class="btn" id="closeApps" aria-label="й–үгҒҳгӮӢ">й–үгҒҳгӮӢ</button>
      </div>

      <div class="modal-body">
        <div class="section">
          <div class="label">гӮўгғ—гғӘдёҖиҰ§</div>
          <div class="list" id="appList">
            <a class="app-item" href="/memo/">гғЎгғў</a>
            <a class="app-item" href="/todo/">ToDo</a>
            <a class="app-item" href="/timer/">гӮҝгӮӨгғһгғј</a>
            <a class="app-item" href="/weather/">еӨ©ж°—</a>
            <a class="app-item" href="/tools/">гғ„гғјгғ«йӣҶ</a>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn primary" id="closeApps2">й–үгҒҳгӮӢ</button>
      </div>
    </div>
  </div>

  <!-- жӨңзҙўж©ҹиғҪпјҲEnter вҶ’ /search?q=пјү -->
  <script>
    const queryInput = document.getElementById("query");
    queryInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        const q = encodeURIComponent(queryInput.value.trim());
        if (!q) return;
        window.location.href = `/search?q=${q}`;
      }
    });

    // modal open/close
    const appsModal = document.getElementById("appsModal");
    document.getElementById("openApps").onclick = () => appsModal.style.display = "flex";
    document.getElementById("closeApps").onclick = () => appsModal.style.display = "none";
    document.getElementById("closeApps2").onclick = () => appsModal.style.display = "none";
  </script>

</body>
</html>
