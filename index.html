<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SURGE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: #fdfdfd;
      --text: #333;
      --muted: #888;
      --border: #d9d9d9;
      --accent: #4da6ff;
      --shadow: rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* top-right bar */
    .topbar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    /* AI ボタン */
    .ai-btn {
      padding: .6rem .8rem;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-weight: 500;
      color: #000;
      cursor: pointer;
      text-decoration: none;
    }

    /* 逆転デザイン：黒い丸に背景色のドット */
    .settings-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      background: #000;      /* 背景を黒に */
      border: none;
      border-radius: 50%;    /* 正円 */
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    
    .settings-btn:hover {
      transform: scale(1.05); /* 少し大きく */
      opacity: 0.85;
    }

    .settings-btn i {
      font-size: 1.3rem;     /* 丸の中に収まる絶妙なサイズ */
      color: var(--bg);      /* ドットの色を背景色と同じにして「抜き」を表現 */
    }

    /* center content */
    .center {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10vh 2rem 6vh;
      text-align: center;
    }

    h1 {
      margin: 0 0 .25rem;
      font-weight: 700;
      font-size: 3.4rem;
      letter-spacing: .06em;
      color: #333;
    }

    .subtitle {
      margin: 0 0 2.2rem;
      color: var(--muted);
      font-size: 1.1rem;
    }

    #query {
      width: min(92vw, 640px);
      padding: 1.35rem 1.4rem;
      font-size: 1.28rem;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: #fff;
      box-shadow: 0 2px 12px var(--shadow);
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    #query:focus {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    /* history */
    .history {
      margin-top: 1.2rem;
      width: min(92vw, 640px);
      text-align: left;
      color: #666;
    }
    .history-title {
      margin: 0 0 .4rem;
      color: #777;
      font-size: .9rem;
    }
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem .6rem;
    }
    .history-item {
      padding: .25rem .55rem;
      border: 1px dashed #cfcfcf;
      border-radius: 14px;
      cursor: pointer;
      background: #fff;
      font-size: .95rem;
    }
    .history-item:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.22);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 1000;
    }
    .modal {
      width: min(94vw, 400px); /* アプリ一覧なので少しスリムに */
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 1.2rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title { font-weight: 600; }
    .modal-body { padding: 1.2rem; }
    .list {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3列に並べる */
      gap: 1rem;
      text-align: center;
    }
    .app-item {
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }
    .app-icon-placeholder {
      width: 48px;
      height: 48px;
      background: #f0f0f0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: background 0.2s;
    }
    .app-item:hover .app-icon-placeholder {
      background: #e0e0e0;
    }

    .modal-footer {
      padding: 1rem;
      text-align: right;
    }
    .btn {
      padding: .5rem 1rem;
      border: none;
      background: #eee;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/ai/" class="ai-btn">AI</a>
    <button class="settings-btn" id="openApps" aria-label="その他アプリ">
      <i class="fa-solid fa-table-cells"></i>
    </button>
  </div>

  <main class="center">
    <h1>SURGE</h1>
    <p class="subtitle">光のように、知をたどる。</p>
    <input id="query" type="text" placeholder="検索ワードを入力…" autocomplete="off" spellcheck="false"/>

    <section class="history" id="historySection">
      <p class="history-title">最近の検索</p>
      <div class="history-list" id="history">
        <span class="history-item">SURGE PRO</span>
        <span class="history-item">デザイン</span>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="appsModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">その他アプリ</span>
        <button class="btn" id="closeApps">✕</button>
      </div>
      <div class="modal-body">
        <div class="list">
          <a class="app-item" href="/memo/">
            <div class="app-icon-placeholder"><i class="fa-solid fa-pen"></i></div>
            <span>メモ</span>
          </a>
          <a class="app-item" href="/todo/">
            <div class="app-icon-placeholder"><i class="fa-solid fa-check"></i></div>
            <span>ToDo</span>
          </a>
          <a class="app-item" href="/timer/">
            <div class="app-icon-placeholder"><i class="fa-solid fa-clock"></i></div>
            <span>タイマー</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const queryInput = document.getElementById("query");
    queryInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const q = encodeURIComponent(queryInput.value.trim());
        if (q) window.location.href = `/search?q=${q}`;
      }
    });

    const appsModal = document.getElementById("appsModal");
    document.getElementById("openApps").onclick = () => appsModal.style.display = "flex";
    document.getElementById("closeApps").onclick = () => appsModal.style.display = "none";
    window.onclick = (e) => { if (e.target == appsModal) appsModal.style.display = "none"; };
  </script>

</body>
</html>
