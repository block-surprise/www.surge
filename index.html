<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Search</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #222;
    }

    h1 {
      font-weight: 300;
      font-size: 2.4rem;
      letter-spacing: 0.05em;
      margin-bottom: 40px;
    }

    .search-box {
      width: 480px;
      max-width: 90%;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 40px;
      padding: 12px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transition: box-shadow 0.25s ease;
    }

    .search-box:focus-within {
      box-shadow: 0 6px 28px rgba(0,0,0,0.12);
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1.1rem;
      background: transparent;
    }

    button {
      border: none;
      background: #0078d4;
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.25s ease;
    }

    button:hover {
      background: #005fa3;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.85rem;
      color: #777;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <h1>Search</h1>

  <form action="/search" method="GET" class="search-box">
    <input type="text" name="q" placeholder="キーワードを入力…" autocomplete="off">
    <button type="submit">検索</button>
  </form>

  <footer>© 2026</footer>

</body>
</html>
