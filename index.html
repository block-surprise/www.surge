<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SURGE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: #fdfdfd;
      --text: #333;
      --muted: #888;
      --border: #d9d9d9;
      --accent: #4da6ff;
      --shadow: rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* top-right bar */
    .topbar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    /* AI ボタン */
    .ai-btn {
      padding: .6rem .8rem;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-weight: 500;
      color: #000;
      cursor: pointer;
      text-decoration: none;
    }

    /* 設定ボタン：装飾なし */
    .settings-btn {
      padding: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease;
    }
    
    .settings-btn:hover {
      opacity: 0.5;
    }

    /* 2x3（6つの点）そのものを黒くする */
    .settings-btn i {
      font-size: 1.8rem;
      color: #000;      /* 点の色を黒に */
      background: none; /* 背景はなし */
    }

    /* center content */
    .center {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10vh 2rem 6vh;
      text-align: center;
    }

    h1 {
      margin: 0 0 .25rem;
      font-weight: 700;
      font-size: 3.4rem;
      letter-spacing: .06em;
      color: #333;
    }

    .subtitle {
      margin: 0 0 2.2rem;
      color: var(--muted);
      font-size: 1.1rem;
    }

    #query {
      width: min(92vw, 640px);
      padding: 1.35rem 1.4rem;
      font-size: 1.28rem;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: #fff;
      box-shadow: 0 2px 12px var(--shadow);
      outline: none;
    }

    /* modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.22);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      width: min(90vw, 360px);
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .modal-header {
      padding: 1.2rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-body { padding: 1.5rem; }
    .list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      text-align: center;
    }
    .app-item {
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
    }
    .app-icon-placeholder {
      width: 44px;
      height: 44px;
      background: #f4f4f4;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/ai/" class="ai-btn">AI</a>
    <button class="settings-btn" id="openApps" aria-label="その他アプリ">
      <i class="fa-solid fa-grip-vertical"></i>
    </button>
  </div>

  <main class="center">
    <h1>SURGE</h1>
    <p class="subtitle">光のように、知をたどる。</p>
    <input id="query" type="text" placeholder="検索ワードを入力…" autocomplete="off"/>
  </main>

  <div class="modal-backdrop" id="appsModal">
    <div class="modal">
      <div class="modal-header">
        <span style="font-weight:600">その他アプリ</span>
        <button id="closeApps" style="border:none; background:none; cursor:pointer; font-size:1.2rem">✕</button>
      </div>
      <div class="modal-body">
        <div class="list">
          <a class="app-item" href="/memo/"><div class="app-icon-placeholder">📝</div><span>メモ</span></a>
          <a class="app-item" href="/todo/"><div class="app-icon-placeholder">✅</div><span>ToDo</span></a>
          <a class="app-item" href="/timer/"><div class="app-icon-placeholder">⏱</div><span>タイマー</span></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const appsModal = document.getElementById("appsModal");
    document.getElementById("openApps").onclick = () => appsModal.style.display = "flex";
    document.getElementById("closeApps").onclick = () => appsModal.style.display = "none";
    window.onclick = (e) => { if (e.target == appsModal) appsModal.style.display = "none"; };
  </script>

</body>
</html>
