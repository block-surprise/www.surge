<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SURGE</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root{
      --bg:#fdfdfd;
      --text:#333;
      --muted:#888;
      --border:#d9d9d9;
      --accent:#4da6ff;
      --shadow:rgba(0,0,0,0.06);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* top-right bar */
    .topbar{
      position:fixed;
      top:12px;
      right:12px;
      display:flex;
      gap:.5rem;
      align-items:center;
    }
    #engine{
      padding:.35rem .6rem;
      font-size:.95rem;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
    }
    .settings-btn{
      padding:.35rem .6rem;
      font-size:.9rem;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:.3rem;
    }
    .settings-btn i{
      font-size:1.05rem;
    }

    /* center */
    .center{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:10vh 2rem 6vh;
      text-align:center;
    }
    h1{
      margin:0 0 .25rem;
      font-weight:600;
      letter-spacing:.04em;
      color:#444;
    }
    .subtitle{
      margin:0 0 2.2rem;
      color:var(--muted);
      font-size:1rem;
    }

    /* search input */
    #query{
      width:min(92vw, 640px);
      padding:0.95rem 1.25rem;
      font-size:1.25rem;
      border:1px solid var(--border);
      border-radius:32px;
      background:#fff;
      box-shadow: 0 2px 10px var(--shadow);
      outline:none;
      transition: border-color .2s ease, box-shadow .2s ease, transform .18s ease;
    }
    .animated:focus{
      border-color:var(--accent);
      box-shadow: 0 0 0 4px rgba(77,166,255,.18), 0 6px 22px var(--shadow);
      transform: translate3d(0,-1px,0);
    }
    .animated:hover{
      box-shadow: 0 3px 14px var(--shadow);
    }

    /* history */
    .history{
      margin-top:1.2rem;
      width:min(92vw, 640px);
      text-align:left;
      color:#666;
      font-size:.95rem;
    }
    .history-title{
      margin:0 0 .4rem;
      color:#777;
      font-size:.9rem;
    }
    .history-list{
      display:flex;
      flex-wrap:wrap;
      gap:.4rem .6rem;
    }
    .history-item{
      padding:.25rem .55rem;
      border:1px dashed #cfcfcf;
      border-radius:14px;
      cursor:pointer;
      background:#fff;
    }
    .history-item:hover{
      color:var(--accent);
      border-color:var(--accent);
    }

    /* modal */
    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.22);
      display:none;
      align-items:center;
      justify-content:center;
      padding:1rem;
    }
    .modal{
      width:min(94vw, 720px);
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      max-height:90vh;
    }
    .modal-header{
      padding:1rem 1.2rem;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .modal-title{
      font-weight:600;
    }
    .modal-body{
      padding:1rem 1.2rem;
      display:grid;
      gap:1.2rem;
      overflow-y:auto;
      flex:1 1 auto;
    }
    .section{
      border:1px solid #eee;
      border-radius:12px;
      padding:.9rem;
    }
    .row{
      display:flex;
      gap:.8rem;
      flex-wrap:wrap;
      align-items:center;
    }
    .label{
      color:#555;
      font-size:.95rem;
      min-width:170px;
    }
    .list{
      display:grid;
      gap:.35rem;
    }
    .modal-footer{
      padding:.9rem 1.2rem;
      border-top:1px solid var(--border);
      display:flex;
      gap:.6rem;
      justify-content:flex-end;
    }
    .btn{
      padding:.5rem .8rem;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      cursor:pointer;
    }
    .btn.primary{
      border-color:var(--accent);
      color:#fff;
      background:var(--accent);
    }
    .btn.danger{
      border-color:#e07272;
      color:#fff;
      background:#e07272;
    }
    .small{
      font-size:.9rem;
      color:#777;
    }

    /* app list */
    .app-item{
      padding:.45rem .7rem;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      text-decoration:none;
      color:var(--text);
      display:inline-block;
      transition:border-color .2s ease, color .2s ease;
    }
    .app-item:hover{
      border-color:var(--accent);
      color:var(--accent);
    }

    @media (max-width:520px){
      .label{min-width:auto}
    }
  </style>
</head>
<body>

  <!-- top bar -->
  <div class="topbar">
    <a href="/ai/" class="settings-btn" style="text-decoration:none; color:inherit;">AI</a>

    <select id="engine" aria-label="検索先"></select>

    <!-- その他アプリ（Font Awesome アイコン） -->
    <button class="settings-btn" id="openApps" aria-label="その他アプリ">
      <i class="fa-solid fa-grid-2"></i>
    </button>
  </div>

  <!-- center -->
  <main class="center">
    <h1>SURGE</h1>
    <p class="subtitle">光のように、知をたどる。</p>

    <input id="query" type="text" placeholder="検索ワードを入力…" autocomplete="off" spellcheck="false"/>

    <section class="history" id="historySection" aria-label="検索履歴">
      <p class="history-title">最近の検索</p>
      <div class="history-list" id="history"></div>
    </section>
  </main>

  <!-- その他アプリ modal -->
  <div class="modal-backdrop" id="appsModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="appsTitle">
      <div class="modal-header">
        <div class="modal-title" id="appsTitle">その他アプリ</div>
        <button class="btn" id="closeApps" aria-label="閉じる">閉じる</button>
      </div>

      <div class="modal-body">

        <!-- app list -->
        <div class="section">
          <div class="label">アプリ一覧</div>
          <div class="list" id="appList">
            <a class="app-item" href="/memo/">メモ</a>
            <a class="app-item" href="/todo/">ToDo</a>
            <a class="app-item" href="/timer/">タイマー</a>
            <a class="app-item" href="/weather/">天気</a>
            <a class="app-item" href="/tools/">ツール集</a>
          </div>
        </div>

        <!-- custom app -->
        <div class="section">
          <div class="label">カスタムアプリの追加</div>
          <div class="row">
            <input id="customAppName" type="text" placeholder="名前（例：Markdownエディタ）"
              style="flex:1; padding:.45rem .6rem; border:1px solid var(--border); border-radius:8px;">
            <input id="customAppUrl" type="text" placeholder="URL（例：/md/）"
              style="flex:2; padding:.45rem .6rem; border:1px solid var(--border); border-radius:8px;">
            <button class="btn" id="addCustomApp">追加</button>
          </div>
          <div id="customAppList" class="list"></div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn" id="resetApps">初期化</button>
        <button class="btn primary" id="saveApps">保存</button>
      </div>
    </div>
  </div>

  <script>
    // modal open/close
    const appsModal = document.getElementById("appsModal");
    document.getElementById("openApps").onclick = () => appsModal.style.display = "flex";
    document.getElementById("closeApps").onclick = () => appsModal.style.display = "none";
  </script>

</body>
</html>
